<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app">
      <h2>Auktionssajten</h2>

      <section id="buttonSection">
        <!-- Denna sektion kanske kan döljas när man är inloggad, eller blir till "logga ut"-knapp som raderar cookies? -->
        <button id="toRegisterPageBtn">Bli medlem</button>
        <button id="toLoginPageBtn">Logga in</button>
      </section>

      <section id="createAuctionSection" class="hide">
        <h3>Skapa auktion</h3>
        <div id="auctionList">
          <form id="createAuctionForm">
            <label>
              Titel:
              <input type="text" id="title" required />
            </label>
            <label>
              Beskrivning:
              <textarea id="description"></textarea>
            </label>
            <label>
              Startpris:
              <input type="number" id="startPrice" required />
            </label>
            <label>
              Sluttid:
              <input type="date" id="endTime" required />
            </label>
            <button type="submit">Skapa auktion</button>
          </form>
        </div>
      </section>

      <h3>Aktiva auktioner</h3>
      <section id="activeAuctions"></section>
      <h3>Avslutade auktioner</h3>
      <section id="endedAuctions"></section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
